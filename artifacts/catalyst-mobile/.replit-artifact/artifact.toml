kind = "web"
previewPath = "/catalyst-mobile/"
title = "Catalyst Observation (Mobile Web)"
version = "1.0.0"
id = "artifacts/catalyst-mobile"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/catalyst-mobile/" ]
localPort = 25869

[services.development]
run = "pnpm --filter @workspace/catalyst-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/catalyst-mobile", "run", "build" ]
publicDir = "artifacts/catalyst-mobile/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25869"
BASE_PATH = "/catalyst-mobile/"
